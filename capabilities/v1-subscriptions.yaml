          description: 'The minor version of the Zuora REST API. '
        - name: subscription-key
          in: path
          type: string
          description: Subscription number or ID. Subscription status must be Suspended.
          required: true
        - name: Request
          in: body
          type: string
          required: true
    - name: v1-subscriptions-subscription-key-suspend
