naftiko: 1.0.0-alpha2
info:
  label: API Reference — Payment Transaction Logs
  description: 'API Reference — Payment Transaction Logs. 1 operations. Lead operation: CRUD: Retrieve a payment transaction
    log. Self-contained Naftiko capability covering one Zuora business surface.'
  tags:
  - Zuora
  - Payment Transaction Logs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZUORA_API_KEY: ZUORA_API_KEY
capability:
  consumes:
  - type: http
    namespace: v1-payment-transaction-logs
    baseUri: https://rest.zuora.com
    description: API Reference — Payment Transaction Logs business capability. Self-contained, no shared references.
    resources:
    - name: v1-object-payment-transaction-log-id
      path: /v1/object/payment-transaction-log/{id}
      operations:
      - name: objectgetpaymenttransactionlog
        method: GET
        description: 'CRUD: Retrieve a payment transaction log'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The ID of a payment transaction log.
          required: true
  exposes:
  - type: rest
    namespace: v1-payment-transaction-logs-rest
    port: 8080
    description: REST adapter for API Reference — Payment Transaction Logs. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/object/payment-transaction-log/{id}
      name: v1-object-payment-transaction-log-id
      description: REST surface for v1-object-payment-transaction-log-id.
      operations:
      - method: GET
        name: objectgetpaymenttransactionlog
        description: 'CRUD: Retrieve a payment transaction log'
        call: v1-payment-transaction-logs.objectgetpaymenttransactionlog
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: v1-payment-transaction-logs-mcp
    port: 9090
    transport: http
    description: MCP adapter for API Reference — Payment Transaction Logs. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: crud-retrieve-payment-transaction-log
      description: 'CRUD: Retrieve a payment transaction log'
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: v1-payment-transaction-logs.objectgetpaymenttransactionlog
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
