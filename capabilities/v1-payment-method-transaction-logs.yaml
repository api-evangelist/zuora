        name: objectgetpaymentmethodtransactionlog
        description: 'CRUD: Retrieve a payment method transaction log'
        call: v1-payment-method-transaction-logs.objectgetpaymentmethodtransactionlog
        with:
          fields: rest.fields
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
