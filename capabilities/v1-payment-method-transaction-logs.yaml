    description: API Reference — Payment Method Transaction Logs business capability. Self-contained, no shared references.
    resources:
    - name: v1-object-payment-method-transaction-log-id
      path: /v1/object/payment-method-transaction-log/{id}
      operations:
      - name: objectgetpaymentmethodtransactionlog
        method: GET
        description: 'CRUD: Retrieve a payment method transaction log'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: string
          description: Object fields to return
        - name: id
          in: path
          type: string
          description: Object id
          required: true
  exposes:
  - type: rest
    namespace: v1-payment-method-transaction-logs-rest
