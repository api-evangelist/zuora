    description: API Reference — Product Rate Plan Definitions business capability. Self-contained, no shared references.
    resources:
    - name: v1-product-rateplan-definitions
      path: /v1/product-rateplan-definitions
      operations:
      - name: postcreateproductrateplandefinition
        method: POST
        description: Create a product rate plan definition
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Request
          in: body
          type: string
          required: true
      - name: getretrieveproductrateplandefinitions
        method: GET
        description: List product rate plan definitions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: charge
          in: query
          type: string
          description: The unique number or ID of the charge for which the product rate plan definitions are to be retrieved.
        - name: rateplan
          in: query
          type: string
          description: The unique number or ID of the product rate plan for which the product rate plan definitions are to
