naftiko: 1.0.0-alpha2
info:
  label: API Reference — Product Rate Plan Definitions
  description: 'API Reference — Product Rate Plan Definitions. 4 operations. Lead operation: Create a product rate plan definition.
    Self-contained Naftiko capability covering one Zuora business surface.'
  tags:
  - Zuora
  - Product Rate Plan Definitions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZUORA_API_KEY: ZUORA_API_KEY
capability:
