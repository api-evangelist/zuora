        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: product-rateplan-definition-key
          in: path
          type: string
          description: The unique ID of the product rate plan definition to be retrieved.
          required: true
      - name: deleteproductrateplandefnition
        method: DELETE
        description: Delete a product rate plan definition
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: product-rateplan-definition-key
          in: path
          type: string
          description: The unique ID of the product rate plan definition to be deleted.
          required: true
