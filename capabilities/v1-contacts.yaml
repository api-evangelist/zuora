    - name: update-contact
      description: Update a contact
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: v1-contacts.putcontact
      with:
        contactId: tools.contactId
        Request: tools.Request
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-contact
      description: Delete a contact
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: v1-contacts.deletecontact
      with:
        contactId: tools.contactId
      outputParameters:
