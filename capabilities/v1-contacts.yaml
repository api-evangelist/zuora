          Request: rest.Request
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletecontact
        description: Delete a contact
        call: v1-contacts.deletecontact
        with:
          contactId: rest.contactId
        outputParameters:
        - type: object
