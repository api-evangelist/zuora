      name: v1-contacts
      description: REST surface for v1-contacts.
      operations:
      - method: POST
        name: postcreatecontact
        description: Create a contact
        call: v1-contacts.postcreatecontact
        with:
          Request: rest.Request
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/contacts/{contactid}
      name: v1-contacts-contactid
