    resources:
    - name: v1-contacts
      path: /v1/contacts
      operations:
      - name: postcreatecontact
        method: POST
        description: Create a contact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Request
          in: body
          type: string
          required: true
    - name: v1-contacts-contactId
      path: /v1/contacts/{contactId}
      operations:
      - name: getcontact
        method: GET
        description: Retrieve a contact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
