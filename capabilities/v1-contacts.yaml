        name: getcontact
        description: Retrieve a contact
        call: v1-contacts.getcontact
        with:
          contactId: rest.contactId
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: putcontact
        description: Update a contact
        call: v1-contacts.putcontact
