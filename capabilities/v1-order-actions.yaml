naftiko: 1.0.0-alpha2
info:
  label: API Reference — Order Actions
  description: 'API Reference — Order Actions. 1 operations. Lead operation: Update an order action. Self-contained Naftiko
    capability covering one Zuora business surface.'
  tags:
  - Zuora
  - Order Actions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZUORA_API_KEY: ZUORA_API_KEY
capability:
  consumes:
  - type: http
    namespace: v1-order-actions
    baseUri: https://rest.zuora.com
    description: API Reference — Order Actions business capability. Self-contained, no shared references.
    resources:
    - name: v1-orderActions-id
      path: /v1/orderActions/{id}
      operations:
      - name: putorderactions
        method: PUT
        description: Update an order action
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The id of the Order Action to update.
          required: true
        - name: ModifyRequest
          in: body
          type: string
          required: true
  exposes:
  - type: rest
    namespace: v1-order-actions-rest
    port: 8080
    description: REST adapter for API Reference — Order Actions. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/orderactions/{id}
      name: v1-orderactions-id
      description: REST surface for v1-orderActions-id.
      operations:
      - method: PUT
        name: putorderactions
        description: Update an order action
        call: v1-order-actions.putorderactions
        with:
          id: rest.id
          ModifyRequest: rest.ModifyRequest
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: v1-order-actions-mcp
    port: 9090
    transport: http
    description: MCP adapter for API Reference — Order Actions. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: update-order-action
      description: Update an order action
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: v1-order-actions.putorderactions
      with:
        id: tools.id
        ModifyRequest: tools.ModifyRequest
      outputParameters:
      - type: object
        mapping: $.
