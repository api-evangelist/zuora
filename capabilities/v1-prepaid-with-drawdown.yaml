naftiko: 1.0.0-alpha2
info:
  label: API Reference — Prepaid with Drawdown
  description: 'API Reference — Prepaid with Drawdown. 2 operations. Lead operation: Reverse fund rollover. Self-contained
    Naftiko capability covering one Zuora business surface.'
  tags:
  - Zuora
  - Prepaid with Drawdown
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZUORA_API_KEY: ZUORA_API_KEY
capability:
  consumes:
  - type: http
    namespace: v1-prepaid-with-drawdown
    baseUri: https://rest.zuora.com
    description: API Reference — Prepaid with Drawdown business capability. Self-contained, no shared references.
    resources:
    - name: v1-ppdd-reverse-rollover
      path: /v1/ppdd/reverse-rollover
      operations:
      - name: postreverserollover
        method: POST
        description: Reverse fund rollover
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ReverseRollover
          in: body
          type: string
          required: true
    - name: v1-ppdd-rollover
      path: /v1/ppdd/rollover
      operations:
      - name: postrollover
        method: POST
        description: Trigger fund rollover
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: TriggerRollover
          in: body
          type: string
          required: true
  exposes:
  - type: rest
    namespace: v1-prepaid-with-drawdown-rest
    port: 8080
    description: REST adapter for API Reference — Prepaid with Drawdown. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/ppdd/reverse-rollover
      name: v1-ppdd-reverse-rollover
      description: REST surface for v1-ppdd-reverse-rollover.
      operations:
      - method: POST
        name: postreverserollover
        description: Reverse fund rollover
        call: v1-prepaid-with-drawdown.postreverserollover
        with:
          ReverseRollover: rest.ReverseRollover
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/ppdd/rollover
      name: v1-ppdd-rollover
      description: REST surface for v1-ppdd-rollover.
      operations:
      - method: POST
        name: postrollover
        description: Trigger fund rollover
        call: v1-prepaid-with-drawdown.postrollover
        with:
          TriggerRollover: rest.TriggerRollover
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: v1-prepaid-with-drawdown-mcp
    port: 9090
    transport: http
    description: MCP adapter for API Reference — Prepaid with Drawdown. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: reverse-fund-rollover
      description: Reverse fund rollover
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: v1-prepaid-with-drawdown.postreverserollover
      with:
        ReverseRollover: tools.ReverseRollover
      outputParameters:
      - type: object
        mapping: $.
    - name: trigger-fund-rollover
      description: Trigger fund rollover
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: v1-prepaid-with-drawdown.postrollover
      with:
        TriggerRollover: tools.TriggerRollover
      outputParameters:
      - type: object
        mapping: $.
